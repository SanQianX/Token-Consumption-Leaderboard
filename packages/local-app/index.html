<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Consumption Leaderboard</title>
    <style>
      /* Pre-mount skeleton shown until React hydrates. Keeps the page from
         looking blank in browsers that take a moment to evaluate the bundle
         (or that error out before render). */
      #boot-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf9f5;
        color: #2e2c28;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        z-index: 9999;
      }
      #boot-skeleton .inner {
        text-align: center;
      }
      #boot-skeleton .spinner {
        width: 28px;
        height: 28px;
        margin: 0 auto 12px;
        border: 3px solid #dcd9d2;
        border-top-color: #2d5d59;
        border-radius: 50%;
        animation: bs-spin 0.8s linear infinite;
      }
      #boot-skeleton .label {
        font-size: 14px;
        color: #7a7872;
      }
      @keyframes bs-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Hide skeleton once React removes it. */
      #boot-skeleton[hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="boot-skeleton" aria-hidden="true">
      <div class="inner">
        <div class="spinner"></div>
        <div class="label">Tokboard 正在加载…</div>
      </div>
    </div>
    <div id="root"></div>
    <noscript>
      <div
        style="
          padding: 24px;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
            sans-serif;
          color: #2e2c28;
        "
      >
        <h1 style="margin: 0 0 8px; font-size: 20px">需要启用 JavaScript</h1>
        <p style="margin: 0; color: #7a7872">
          Tokboard 是一款基于浏览器的本地仪表盘，请开启 JavaScript 后再访问。
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
