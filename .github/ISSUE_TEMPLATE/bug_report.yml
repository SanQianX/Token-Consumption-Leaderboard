name: Bug Report
description: Report something that is broken or confusing.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please avoid pasting private Claude Code logs, local project paths, secrets, or customer data.
  - type: input
    id: version
    attributes:
      label: Tokboard version
      description: Run `tokboard -v`.
      placeholder: "tokboard v2.4.1"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Run `node -v`.
      placeholder: "v20.15.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `tokboard ...`
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
