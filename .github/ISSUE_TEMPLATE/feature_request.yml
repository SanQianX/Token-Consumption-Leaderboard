name: Feature Request
description: Suggest an improvement for Tokboard.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tokboard is local-first and read-only by default. Please call out any privacy, packaging, or open-source-boundary impact.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Tokboard change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: privacy
    attributes:
      label: Does this require network access or a hosted service?
      options:
        - "No"
        - "Yes"
        - "Unsure"
    validations:
      required: true
